version: '3.8'

services:
  # 1. 데이터베이스
  db:
    image: mysql:8.0
    container_name: asset-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: asset_db
    volumes:
      - ./mysql_data:/var/lib/mysql

  # 2. 백엔드 (수정됨)
  backend:
    build: ./backend  # 폴더 경로를 정확히 지정!
    container_name: asset-backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/asset_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1234

  # 3. 프론트엔드 (추가됨)
  frontend:
    build: ./frontend # 폴더 경로를 정확히 지정!
    container_name: asset-frontend
    ports:
      - "5173:5173"